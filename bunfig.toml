[install]
linker = "hoisted"
auto = "disable"
saveTextLockfile = true

# Each TypeScript space gets its OWN bun install cache. The shared
# ~/.bun/install/cache/ is owned by hatch-daemon; if a TS space install ran
# under a different uid (e.g. a developer testing via `sudo -u hatch`), the
# shared cache would acquire entries the daemon can't overwrite later
# (ENOTEMPTY on @hatch/space-sdk et al when bun renames the .tmp slot).
[install.cache]
dir = ".bun-cache"
disable = false
